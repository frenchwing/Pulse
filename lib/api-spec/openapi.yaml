openapi: 3.1.0
info:
  title: Api
  version: 0.2.0
  description: Pulse API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
  - name: activities
  - name: events
  - name: stats
  - name: profiles
  - name: crews
  - name: auth

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ── Activities ──────────────────────────────────────────────
  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List activities
      parameters:
        - { name: type, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string } }
        - { name: skillLevel, in: query, required: false, schema: { type: string } }
        - { name: genderPref, in: query, required: false, schema: { type: string } }
        - { name: activityKind, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Create an activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{id}:
    get:
      operationId: getActivity
      tags: [activities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found
    patch:
      operationId: updateActivity
      tags: [activities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    delete:
      operationId: deleteActivity
      tags: [activities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /activities/{id}/join:
    post:
      operationId: joinActivity
      tags: [activities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinInput"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{id}/ratings:
    get:
      operationId: getActivityRatings
      tags: [activities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RatingItem"
    post:
      operationId: rateActivityPlayer
      tags: [activities]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingItem"

  # ── Events ───────────────────────────────────────────────────
  /events:
    get:
      operationId: listEvents
      tags: [events]
      parameters:
        - { name: type, in: query, required: false, schema: { type: string } }
        - { name: status, in: query, required: false, schema: { type: string } }
        - { name: genderPref, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: List
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "204":
          description: Deleted

  /events/{id}/join:
    post:
      operationId: joinEvent
      tags: [events]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinInput"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}/ratings:
    get:
      operationId: getEventRatings
      tags: [events]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Ratings
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/RatingItem"
    post:
      operationId: rateEventPlayer
      tags: [events]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RatingInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RatingItem"

  # ── Stats ─────────────────────────────────────────────────────
  /stats/summary:
    get:
      operationId: getSummaryStats
      tags: [stats]
      responses:
        "200":
          description: Stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryStats"

  # ── Profiles ──────────────────────────────────────────────────
  /profiles:
    get:
      operationId: listProfiles
      tags: [profiles]
      parameters:
        - { name: name, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Profile"
    post:
      operationId: createProfile
      tags: [profiles]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{id}:
    get:
      operationId: getProfile
      tags: [profiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"
        "404":
          description: Not found
    patch:
      operationId: updateProfile
      tags: [profiles]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProfileUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  /profiles/{id}/verify:
    post:
      operationId: submitKyc
      tags: [profiles]
      summary: Submit eKYC verification request
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KycInput"
      responses:
        "200":
          description: KYC submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Profile"

  # ── Crews ─────────────────────────────────────────────────────
  /crews:
    get:
      operationId: listCrews
      tags: [crews]
      parameters:
        - { name: sport, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Crews
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Crew"
    post:
      operationId: createCrew
      tags: [crews]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrewInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crew"

  /crews/{id}:
    get:
      operationId: getCrew
      tags: [crews]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Crew
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crew"
        "404":
          description: Not found
    patch:
      operationId: updateCrew
      tags: [crews]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CrewUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Crew"

  # ── Clubs ─────────────────────────────────────────────────────
  /clubs:
    get:
      operationId: listClubs
      tags: [clubs]
      parameters:
        - { name: sport, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Clubs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Club2"
    post:
      operationId: createClub
      tags: [clubs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club2"

  /clubs/{id}:
    get:
      operationId: getClub
      tags: [clubs]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Club
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Club2"
        "404":
          description: Not found

  /clubs/{id}/inquire:
    post:
      operationId: submitClubInquiry
      tags: [clubs]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ClubInquiryInput"
      responses:
        "201":
          description: Inquiry submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ClubInquiry"

  /clubs/{id}/inquiries:
    get:
      operationId: listClubInquiries
      tags: [clubs]
      parameters:
        - { name: id, in: path, required: true, schema: { type: integer } }
      responses:
        "200":
          description: Inquiries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ClubInquiry"

  /clubs/battles:
    get:
      operationId: listCorpBattles
      tags: [clubs]
      parameters:
        - { name: sport, in: query, required: false, schema: { type: string } }
      responses:
        "200":
          description: Corp battles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CorpBattle"
    post:
      operationId: createCorpBattle
      tags: [clubs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CorpBattleInput"
      responses:
        "201":
          description: Battle created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CorpBattle"

  # ── Auth ──────────────────────────────────────────────────────
  /auth/otp/send:
    post:
      operationId: sendOtp
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpSendInput"
      responses:
        "200":
          description: OTP sent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpSendResponse"

  /auth/otp/verify:
    post:
      operationId: verifyOtp
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OtpVerifyInput"
      responses:
        "200":
          description: Verified
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OtpVerifyResponse"
        "400":
          description: Invalid OTP

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status: { type: string }
      required: [status]

    Activity:
      type: object
      required: [id, title, type, activityKind, address, latitude, longitude, date, time, maxPlayers, currentPlayers, hostName, hostReliabilityScore, isHostOnline, genderPref, visibility, status, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        type: { type: string }
        activityKind: { type: string }
        description: { type: ["string", "null"] }
        address: { type: string }
        venue: { type: ["string", "null"] }
        latitude: { type: number }
        longitude: { type: number }
        date: { type: string }
        time: { type: string }
        expiresAt: { type: ["string", "null"] }
        maxPlayers: { type: integer }
        currentPlayers: { type: integer }
        skillLevel: { type: ["string", "null"] }
        genderPref: { type: string }
        venueFee: { type: ["number", "null"] }
        estimatedCostPerPerson: { type: ["number", "null"] }
        hostName: { type: string }
        hostAvatar: { type: ["string", "null"] }
        hostReliabilityScore: { type: integer }
        isHostOnline: { type: boolean }
        crewId: { type: ["integer", "null"] }
        note: { type: ["string", "null"] }
        visibility: { type: string }
        status: { type: string }
        createdAt: { type: string }

    ActivityInput:
      type: object
      required: [title, type, address, latitude, longitude, date, time, maxPlayers, hostName]
      properties:
        title: { type: string }
        type: { type: string }
        activityKind: { type: string }
        description: { type: string }
        address: { type: string }
        venue: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        date: { type: string }
        time: { type: string }
        expiresAt: { type: string }
        maxPlayers: { type: integer }
        skillLevel: { type: string }
        genderPref: { type: string }
        venueFee: { type: number }
        estimatedCostPerPerson: { type: number }
        hostName: { type: string }
        hostAvatar: { type: string }
        crewId: { type: integer }
        note: { type: string }
        visibility: { type: string }

    ActivityUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        date: { type: string }
        time: { type: string }
        maxPlayers: { type: integer }
        skillLevel: { type: string }
        genderPref: { type: string }
        venueFee: { type: number }
        estimatedCostPerPerson: { type: number }
        status: { type: string }
        note: { type: string }
        isHostOnline: { type: boolean }

    Event:
      type: object
      required: [id, title, type, address, latitude, longitude, date, time, maxAttendees, currentAttendees, hostName, status, createdAt]
      properties:
        id: { type: integer }
        title: { type: string }
        type: { type: string }
        description: { type: ["string", "null"] }
        address: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        date: { type: string }
        time: { type: string }
        maxAttendees: { type: integer }
        currentAttendees: { type: integer }
        hostName: { type: string }
        hostAvatar: { type: ["string", "null"] }
        genderPref: { type: string }
        estimatedCostPerPerson: { type: ["number", "null"] }
        status: { type: string }
        createdAt: { type: string }

    EventInput:
      type: object
      required: [title, type, address, latitude, longitude, date, time, maxAttendees, hostName]
      properties:
        title: { type: string }
        type: { type: string }
        description: { type: string }
        address: { type: string }
        latitude: { type: number }
        longitude: { type: number }
        date: { type: string }
        time: { type: string }
        maxAttendees: { type: integer }
        hostName: { type: string }
        hostAvatar: { type: string }
        genderPref: { type: string }
        estimatedCostPerPerson: { type: number }

    EventUpdate:
      type: object
      properties:
        title: { type: string }
        description: { type: string }
        date: { type: string }
        time: { type: string }
        maxAttendees: { type: integer }
        genderPref: { type: string }
        status: { type: string }

    JoinInput:
      type: object
      required: [name]
      properties:
        name: { type: string }

    RatingInput:
      type: object
      required: [fromName, toName, score]
      properties:
        fromName: { type: string }
        toName: { type: string }
        score: { type: integer, minimum: 1, maximum: 10 }

    RatingItem:
      type: object
      required: [id, entityType, entityId, fromName, toName, score, createdAt]
      properties:
        id: { type: integer }
        entityType: { type: string }
        entityId: { type: integer }
        fromName: { type: string }
        toName: { type: string }
        score: { type: integer }
        createdAt: { type: string }

    SummaryStats:
      type: object
      required: [totalActivities, totalEvents, openActivities, openEvents, activityByType, eventByType]
      properties:
        totalActivities: { type: integer }
        totalEvents: { type: integer }
        openActivities: { type: integer }
        openEvents: { type: integer }
        activityByType:
          type: object
          additionalProperties: { type: integer }
        eventByType:
          type: object
          additionalProperties: { type: integer }

    Profile:
      type: object
      required: [id, name, locationCity, gender, womenOnlyPref, isVerified, kycStatus, gamesPlayed, gamesHosted, streakWeeks, reputationTags, sports, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        phone: { type: ["string", "null"] }
        bio: { type: ["string", "null"] }
        avatarUrl: { type: ["string", "null"] }
        locationCity: { type: string }
        locationArea: { type: ["string", "null"] }
        gender: { type: string }
        womenOnlyPref: { type: boolean }
        isVerified: { type: boolean }
        kycStatus: { type: string }
        gamesPlayed: { type: integer }
        gamesHosted: { type: integer }
        streakWeeks: { type: integer }
        reputationTags:
          type: array
          items: { type: string }
        sports:
          type: array
          items:
            type: object
            properties:
              sport: { type: string }
              skillLevel: { type: string }
            required: [sport, skillLevel]
        createdAt: { type: string }

    ProfileInput:
      type: object
      required: [name]
      properties:
        name: { type: string }
        phone: { type: string }
        bio: { type: string }
        avatarUrl: { type: string }
        locationCity: { type: string }
        locationArea: { type: string }
        gender: { type: string }
        womenOnlyPref: { type: boolean }
        sports:
          type: array
          items:
            type: object
            properties:
              sport: { type: string }
              skillLevel: { type: string }
            required: [sport, skillLevel]

    ProfileUpdate:
      type: object
      properties:
        name: { type: string }
        bio: { type: string }
        avatarUrl: { type: string }
        locationArea: { type: string }
        gender: { type: string }
        womenOnlyPref: { type: boolean }
        sports:
          type: array
          items:
            type: object
            properties:
              sport: { type: string }
              skillLevel: { type: string }
            required: [sport, skillLevel]
        reputationTags:
          type: array
          items: { type: string }
        gamesPlayed: { type: integer }
        gamesHosted: { type: integer }
        streakWeeks: { type: integer }

    KycInput:
      type: object
      required: [docNumber, docType]
      properties:
        docNumber: { type: string }
        docType: { type: string }

    Crew:
      type: object
      required: [id, name, hostName, memberCount, memberNames, isPublic, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        description: { type: ["string", "null"] }
        hostName: { type: string }
        sport: { type: ["string", "null"] }
        memberNames:
          type: array
          items: { type: string }
        memberCount: { type: integer }
        isPublic: { type: boolean }
        createdAt: { type: string }

    CrewInput:
      type: object
      required: [name, hostName]
      properties:
        name: { type: string }
        description: { type: string }
        hostName: { type: string }
        sport: { type: string }
        memberNames:
          type: array
          items: { type: string }
        isPublic: { type: boolean }

    CrewUpdate:
      type: object
      properties:
        name: { type: string }
        description: { type: string }
        sport: { type: string }
        memberNames:
          type: array
          items: { type: string }
        isPublic: { type: boolean }

    OtpSendInput:
      type: object
      required: [phone]
      properties:
        phone: { type: string }

    OtpSendResponse:
      type: object
      required: [message, devCode]
      properties:
        message: { type: string }
        devCode: { type: string }

    OtpVerifyInput:
      type: object
      required: [phone, code]
      properties:
        phone: { type: string }
        code: { type: string }

    OtpVerifyResponse:
      type: object
      required: [verified, profileId]
      properties:
        verified: { type: boolean }
        profileId: { type: ["integer", "null"] }
        isNewUser: { type: boolean }

    Club2:
      type: object
      required: [id, name, leaderName, sport, memberNames, memberCount, isExclusive, city, reliabilityScore, avgDopeLevel, wins, losses, createdAt]
      properties:
        id: { type: integer }
        name: { type: string }
        tagline: { type: ["string", "null"] }
        description: { type: ["string", "null"] }
        leaderName: { type: string }
