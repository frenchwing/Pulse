openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Playmate API - find sports players and social event companions nearby
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: activities
    description: Sports activity listings
  - name: events
    description: Social event listings
  - name: stats
    description: Summary statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /activities:
    get:
      operationId: listActivities
      tags: [activities]
      summary: List all sports activities
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of activities
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Activity"
    post:
      operationId: createActivity
      tags: [activities]
      summary: Create a sports activity
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /activities/{id}:
    get:
      operationId: getActivity
      tags: [activities]
      summary: Get a single activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Activity
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
        "404":
          description: Not found
    patch:
      operationId: updateActivity
      tags: [activities]
      summary: Update an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ActivityUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"
    delete:
      operationId: deleteActivity
      tags: [activities]
      summary: Delete an activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /activities/{id}/join:
    post:
      operationId: joinActivity
      tags: [activities]
      summary: Join a sports activity
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinInput"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Activity"

  /events:
    get:
      operationId: listEvents
      tags: [events]
      summary: List all social events
      parameters:
        - name: type
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Event"
    post:
      operationId: createEvent
      tags: [events]
      summary: Create a social event
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventInput"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /events/{id}:
    get:
      operationId: getEvent
      tags: [events]
      summary: Get a single event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Event
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
        "404":
          description: Not found
    patch:
      operationId: updateEvent
      tags: [events]
      summary: Update an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EventUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"
    delete:
      operationId: deleteEvent
      tags: [events]
      summary: Delete an event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /events/{id}/join:
    post:
      operationId: joinEvent
      tags: [events]
      summary: Join a social event
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/JoinInput"
      responses:
        "200":
          description: Joined
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Event"

  /stats/summary:
    get:
      operationId: getSummaryStats
      tags: [stats]
      summary: Get summary counts grouped by type for activities and events
      responses:
        "200":
          description: Summary stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SummaryStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    Activity:
      type: object
      required:
        - id
        - title
        - type
        - address
        - latitude
        - longitude
        - date
        - time
        - maxPlayers
        - currentPlayers
        - hostName
        - status
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          description: "pickleball | basketball | volleyball | cricket | tennis"
        description:
          type: ["string", "null"]
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        date:
          type: string
        time:
          type: string
        maxPlayers:
          type: integer
        currentPlayers:
          type: integer
        hostName:
          type: string
        hostAvatar:
          type: ["string", "null"]
        status:
          type: string
          description: "open | full | cancelled"
        createdAt:
          type: string

    ActivityInput:
      type: object
      required:
        - title
        - type
        - address
        - latitude
        - longitude
        - date
        - time
        - maxPlayers
        - hostName
      properties:
        title:
          type: string
        type:
          type: string
        description:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        date:
          type: string
        time:
          type: string
        maxPlayers:
          type: integer
        hostName:
          type: string
        hostAvatar:
          type: string

    ActivityUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
        time:
          type: string
        maxPlayers:
          type: integer
        status:
          type: string

    Event:
      type: object
      required:
        - id
        - title
        - type
        - address
        - latitude
        - longitude
        - date
        - time
        - maxAttendees
        - currentAttendees
        - hostName
        - status
        - createdAt
      properties:
        id:
          type: integer
        title:
          type: string
        type:
          type: string
          description: "museum | coffee | other"
        description:
          type: ["string", "null"]
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        date:
          type: string
        time:
          type: string
        maxAttendees:
          type: integer
        currentAttendees:
          type: integer
        hostName:
          type: string
        hostAvatar:
          type: ["string", "null"]
        status:
          type: string
          description: "open | full | cancelled"
        createdAt:
          type: string

    EventInput:
      type: object
      required:
        - title
        - type
        - address
        - latitude
        - longitude
        - date
        - time
        - maxAttendees
        - hostName
      properties:
        title:
          type: string
        type:
          type: string
        description:
          type: string
        address:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        date:
          type: string
        time:
          type: string
        maxAttendees:
          type: integer
        hostName:
          type: string
        hostAvatar:
          type: string

    EventUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        date:
          type: string
        time:
          type: string
        maxAttendees:
          type: integer
        status:
          type: string

    JoinInput:
      type: object
      required:
        - name
      properties:
        name:
          type: string

    SummaryStats:
      type: object
      required:
        - totalActivities
        - totalEvents
        - openActivities
        - openEvents
        - activityByType
        - eventByType
      properties:
        totalActivities:
          type: integer
        totalEvents:
          type: integer
        openActivities:
          type: integer
        openEvents:
          type: integer
        activityByType:
          type: object
          additionalProperties:
            type: integer
        eventByType:
          type: object
          additionalProperties:
            type: integer
